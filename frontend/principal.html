<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GerenciGeo | Technical Precision</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  </head>
  <body class="h-screen flex overflow-hidden">
    <!-- Sidebar (Barra Lateral Compacta) -->
    <aside id="sidebar" class="w-56 glass-card border-r-0 border-y-0 rounded-none flex flex-col p-4 z-20 sidebar-collapsed">
      <div class="flex items-center justify-between mb-6 px-2" id="sidebar-header">
        <div class="flex items-center gap-3 min-w-0">
          <div class="w-10 h-10 bg-mint-vibrant rounded-technical flex items-center justify-center shadow-[0_0_15px_rgba(0,245,160,0.3)] shrink-0">
            <i data-lucide="crosshair" class="text-forest-deep w-6 h-6"></i>
          </div>
          <h1 class="text-xl font-bold tracking-tight sidebar-text truncate">Gerenci<span class="text-mint-vibrant">Geo</span></h1>
        </div>
        <button id="btn-toggle-sidebar" class="text-white/60 hover:text-mint-vibrant p-1 hover:bg-white/5 rounded transition-all shrink-0 ml-1" title="Expandir menu">
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>

      <nav class="flex-1 space-y-2">
        <a href="#dashboard" class="nav-link active flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="layout-dashboard" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Dashboard</span>
        </a>
        <a href="#clientes" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="users" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Clientes</span>
        </a>
        <a href="#levantamentos" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="map-pin" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Levantamentos</span>
        </a>
        <a href="#propriedades" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="home" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Propriedades</span>
        </a>
        <a href="#ppp" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="cpu" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Módulo PPP</span>
        </a>
        <a href="#historico" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="history" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Histórico</span>
        </a>
        <a href="#hgo" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="folder-tree" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Organizador HGO</span>
        </a>
        <a href="#fronteira" class="nav-link flex items-center gap-3 px-3 py-2 rounded-technical transition-all hover:bg-white/5 group">
          <i data-lucide="file-check" class="w-5 h-5 text-white/60 group-hover:text-mint-vibrant shrink-0"></i>
          <span class="sidebar-text">Área de Fronteira</span>
        </a>
      </nav>

      <div class="mt-auto pt-6 border-t border-white/10 space-y-4" id="sidebar-footer">
        <div class="flex items-center gap-3 px-2">
          <div class="w-8 h-8 rounded-full bg-mint-vibrant/20 border border-mint-vibrant/40 flex items-center justify-center text-xs font-bold text-mint-vibrant shrink-0">
            AD
          </div>
          <div class="flex-1 min-w-0 sidebar-text">
            <p class="text-sm font-semibold truncate">Admin</p>
            <p class="text-[10px] text-white/40 truncate">Licença Profissional</p>
          </div>
        </div>
        <button class="w-full btn-secondary text-sm py-1.5 flex items-center justify-center gap-2" id="btn-sidebar-settings">
          <i data-lucide="settings" class="w-4 h-4 shrink-0"></i>
          <span class="sidebar-text">Configurações</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative">
      <!-- Background Glows -->
      <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-mint-vibrant/5 blur-[120px] rounded-full -z-10"></div>
      <div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-mint-vibrant/5 blur-[100px] rounded-full -z-10"></div>

      <!-- Scrollable Container -->
      <div id="view-container" class="flex-1 overflow-y-auto p-6">
        <!-- Views will be injected here -->
      </div>
    </main>

    <!-- Modal Parcel Details -->
    <div id="parcel-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-center justify-center hidden transition-all duration-300" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="glass-card w-full max-w-md p-0 overflow-hidden border-mint-vibrant/20 shadow-2xl">
        <div class="bg-mint-vibrant/10 px-6 py-4 border-b border-white/10 flex justify-between items-center">
          <h3 id="modal-title" class="text-lg font-bold flex items-center gap-2 text-white">
            <i data-lucide="map-icon" class="w-5 h-5 text-mint-vibrant"></i>
            Detalhes da Parcela
          </h3>
          <button class="text-white/40 hover:text-white transition-colors" id="close-modal" aria-label="Fechar Modal">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="p-6 space-y-6" id="modal-content">
          <!-- Content injected via JS -->
        </div>
        <div class="p-6 pt-0 hidden" id="modal-footer">
          <a id="sigef-link" href="#" target="_blank" rel="noopener noreferrer" class="btn-primary w-full flex items-center justify-center gap-2 py-3">
            <i data-lucide="external-link" class="w-4 h-4"></i>
            VER NO SIGEF COMPLETO
          </a>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
